name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (!startsWith(github.event.head_commit.message, 'chore: release') &&
      !contains(github.event.head_commit.message, '[skip ci]'))
    outputs:
      steamcmd: ${{ steps.filter.outputs.steamcmd }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            steamcmd:
              - 'steamcmd/**'

  release:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | head -1 | grep -qi '^\[major\]'; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$COMMIT_MSG" | head -1 | grep -qi '^\[minor\]'; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Bump type: $(cat "$GITHUB_OUTPUT" | grep type | cut -d= -f2)"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          BUMP_TYPE=${{ steps.bump.outputs.type }}
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

      - name: Commit and tag version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git add VERSION
          git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags

  docker-steamcmd:
    needs: [changes, release]
    if: needs.changes.outputs.steamcmd == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push steamcmd
        uses: docker/build-push-action@v5
        with:
          context: ./steamcmd
          file: ./steamcmd/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/steamcmd:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/steamcmd:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-csgo:
    needs: [changes, release, docker-steamcmd]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine steamcmd tag
        id: steamcmd-tag
        run: |
          if [[ "${{ needs.docker-steamcmd.result }}" == "success" ]]; then
            echo "tag=${{ needs.release.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push csgo
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bullseye/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/steamcmd:${{ steps.steamcmd-tag.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/csgo:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/csgo:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
