// Server settings
log off
sv_tags "Tournament, pcw, war"
sv_pausable 0
sv_allow_votes 0
sv_allow_wait_command 1
sv_alltalk 1
sv_alternateticks 0
sv_cheats 0
sv_deadtalk 1
sv_forcepreload 1
sv_full_alltalk 1
sv_friction 4

// Logging
sv_log_onefile 0
sv_logbans 0
sv_logecho 0
sv_logfile 0
sv_logflush 0
sv_logsdir "logs"

// Network rates (128 tick)
sv_maxrate 128000
sv_minrate 80000
sv_maxcmdrate 128
sv_mincmdrate 64
sv_minupdaterate 64
sv_maxupdaterate 128

// Downloads
sv_allowupload 0
sv_allowdownload 0
sv_pure_kick_clients 1

// Lag compensation
sv_unlag 1
sv_maxunlag 0.5

// Bots
bot_quota 0
bot_chatter off

// Economy
mp_maxmoney 60000
mp_startmoney 60000

// Misc
sv_infinite_ammo 0

exec eslgotv.cfg
